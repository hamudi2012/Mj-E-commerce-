<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ E-Commerce - Katalog</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 30px auto; 
        }
        .card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-info h3 { margin: 0; font-size: 1.1em; color: #333; }
        .price { color: #28a745; font-weight: bold; font-size: 1.2em; margin-top: 10px; }
        .btn-beli { 
            display: block; 
            text-align: center; 
            background: #007bff; 
            color: white; 
            text-decoration: none; 
            padding: 10px; 
            margin-top: 10px; 
            border-radius: 6px;
        }
        #loading { text-align: center; font-size: 1.2em; color: #666; }
    </style>
</head>
<body>

    <h1>🛍️ Katalog MJ Store</h1>
    
    <div id="loading">Sedang memuat produk...</div>
    <div class="grid-container" id="katalog"></div>

    <script>
        // --- KONFIGURASI ---
        const USERNAME = "hamudi2012";
        const REPO = "Mj-E-commerce-";

        async function muatKatalog() {
            const katalogDiv = document.getElementById('katalog');
            const loading = document.getElementById('loading');

            try {
                // 1. Ambil daftar file di folder database/products
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/database/products/`);
                const files = await response.json();

                if (files.length === 0) {
                    loading.innerText = "Belum ada produk yang dipajang.";
                    return;
                }

                // 2. Loop setiap file untuk ambil datanya
                for (let file of files) {
                    if (file.name.endsWith('.json')) {
                        const resData = await fetch(file.download_url);
                        const produk = await resData.json();

                        // 3. Render ke HTML
                        const card = `
                            <div class="card">
                                <img src="${produk.foto}" alt="${produk.nama}">
                                <div class="card-info">
                                    <h3>${produk.nama}</h3>
                                    <div class="price">Rp ${parseInt(produk.harga).toLocaleString('id-ID')}</div>
                                    <a href="https://wa.me/628123456789?text=Halo, saya mau beli ${produk.nama}" class="btn-beli">Beli via WA</a>
                                </div>
                            </div>
                        `;
                        katalogDiv.innerHTML += card;
                    }
                }
                loading.style.display = 'none';

            } catch (err) {
                console.error(err);
                loading.innerText = "Gagal memuat katalog. Pastikan repo publik.";
            }
        }

        muatKatalog();
    </script>
</body>
</html>
